server.port=8080
spring.application.name=Quantifyre_Iris_Agency_Client

# ==========================================
# POSTGRESQL CONFIGURATION (Supabase)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
spring.main.allow-bean-definition-overriding=true

# ==========================================
# MONGODB CONFIGURATION
# ==========================================
spring.mongodb.uri=${SPRING_MONGODB_URI}

# ==========================================
# GOOGLE INTEGRATIONS (Required by Common Module)
# ==========================================
google.ads.client-id=${GOOGLE_CLIENT_ID}
google.ads.client-secret=${GOOGLE_ADS_CLIENT_SECRET}
google.ads.callback-url=${GOOGLE_ADS_CALLBACK_URL}


facebook.app-id=${FACEBOOK_APP_ID}
facebook.app-secret=${FACEBOOK_APP_SECRET}
facebook.callback-url=${FACEBOOK_ADS_CALLBACK_URL}

# ==========================================
# EMAIL CONFIGURATION (For Common Module Service)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true